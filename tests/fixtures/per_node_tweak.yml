tweak:
  placeholder: "@@"

connectors:
  X1:
    pinlabels: [A, B]
    tweak:
      append:
        - "@@_extra [color=red, style=dashed];"

cables:
  W1:
    gauge: 0.25 mm2
    length: 0.1
    color_code: DIN
    wirecount: 2
    tweak:
      append:
        - "@@_label [label=\"cable @@\"];"

connections:
  - - X1: [1, 2]
    - W1: [1, 2]
